<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ラーメンを探す</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #2f2f2f; }
      .container { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }
      h1 { margin: 0 0 20px; text-align: center; font-size: 24px; }
      button { display:block; width:92%; margin: 0 auto; min-height: 44px; border:2px solid #f08a3c; border-radius: 14px; background:#fffaf6; color:#e07a2b; font-size:16px; font-weight:700; }
      button:disabled { opacity: .85; }
      .spinner { display:inline-block; width:18px; height:18px; margin-right:8px; vertical-align:-3px; border:3px solid #ffd9bf; border-top:3px solid #e07a2b; border-radius:50%; animation: spin .8s linear infinite; }
      @keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ラーメンを探す</h1>
      <button id="searchBtn" type="button">現在地を送信</button>
    </div>

    <script>
      const LIFF_ID = new URLSearchParams(location.search).get("liffId") || "2009360861-I31kIVzt";
      const btn = document.getElementById("searchBtn");

      async function getCurrentPosition() {
        return new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          });
        });
      }

      async function main() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
      }

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>送信中';
        try {
          if (!liff.isInClient()) {
            throw new Error("LINEアプリ内で開いてください。");
          }
          if (!navigator.geolocation) throw new Error("この端末は位置情報に未対応です。");
          const pos = await getCurrentPosition();
          await liff.sendMessages([
            {
              type: "location",
              title: "ラーメン検索",
              address: "datetime=",
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
            },
          ]);
          if (liff.isInClient()) liff.closeWindow();
        } catch (error) {
          alert(`位置情報の送信に失敗しました。\n${error.message || error}`);
          btn.disabled = false;
          btn.textContent = "現在地を送信";
        }
      });

      main().catch((error) => {
        alert(`LIFF初期化に失敗しました。\n${error.message || error}`);
      });
    </script>
  </body>
</html>
