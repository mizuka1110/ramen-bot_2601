<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ラーメンの好み</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #2f2f2f;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .sub {
      margin: 0 0 20px;
      text-align: center;
      font-size: 13px;
      color: #7a7a7a;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    .label {
      flex: 0 0 72px;
      font-size: 14px;
      font-weight: 700;
      color: #343434;
    }

    .segment {
      display: flex;
      flex: 1;
      border: 1px solid #e6e6ea;
      border-radius: 12px;
      overflow: hidden;
      background: #f7f7f9;
    }

    .segment button {
      flex: 1;
      min-height: 38px;
      padding: 8px 4px;
      border: none;
      border-right: 1px solid #e6e6ea;
      background: transparent;
      color: #666;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: background-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
    }

    .segment button:last-child {
      border-right: none;
    }

    .segment button.active {
      background: #ff8c3a;
      color: #fff;
    }

    .segment button:active {
      opacity: 0.85;
    }

    .save{
      display:block;
      width:92%;
      margin:24px auto 0;

      min-height:40px;
      padding:12px 16px;

      border:2px solid #f08a3c;
      border-radius:14px;

      background:#fffaf6;
      color:#e07a2b;

      font-size:16px;
      font-weight:700;

      box-shadow:0 2px 6px rgba(0,0,0,0.06);
      transition:transform 0.12s ease, background-color 0.12s ease, color 0.12s ease;
    }

    .save:active {
      transform: scale(0.98);
    }

    .save:disabled {
      opacity: 0.9;
    }

    .close {
      width: 100%;
      margin-top: 10px;
      margin-bottom: 20px;
      min-height: 40px;
      padding: 10px 12px;
      border: none;
      background: none;
      color: #8d8d93;
      font-size: 14px;
      font-weight: 500;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 8px;
      vertical-align: -3px;
      border: 3px solid #ffd9bf;
      border-top: 3px solid #e07a2b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .message {
      min-height: 20px;
      margin-top: 8px;
      text-align: center;
      font-size: 13px;
      color: #6f6f73;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ラーメンの好み</h1>
    <p class="sub">登録された好みをもとに検索結果を表示します</p>

    <div class="row">
      <div class="label">こってり</div>
      <div class="segment" data-key="kotteri">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">あっさり</div>
      <div class="segment" data-key="assari">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">魚介</div>
      <div class="segment" data-key="gyokai">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">煮干し</div>
      <div class="segment" data-key="niboshi">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">鶏白湯</div>
      <div class="segment" data-key="toripaitan">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">豚骨</div>
      <div class="segment" data-key="tonkotsu">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">味噌</div>
      <div class="segment" data-key="miso">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <div class="row">
      <div class="label">辛い</div>
      <div class="segment" data-key="spicy">
        <button type="button" data-value="love">大好き</button>
        <button type="button" data-value="like">好き</button>
        <button type="button" data-value="neutral">普通</button>
        <button type="button" data-value="dislike">苦手</button>
      </div>
    </div>

    <button id="saveBtn" class="save" type="button">保存する</button>
    <button id="closeBtn" class="close" type="button">閉じる</button>
    <div id="message" class="message"></div>
  </div>

  <script>
    let userId = null;

    async function main() {
      try {
        await liff.init({
          liffId: "2009360861-I31kIVzt"
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;
      } catch (error) {
        console.error(error);
        document.getElementById("message").innerText = "LIFFの初期化に失敗しました";
      }
    }

    function setupSegments() {
      document.querySelectorAll(".segment").forEach((segment) => {
        segment.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            segment.querySelectorAll("button").forEach((b) => {
              b.classList.remove("active");
            });
            button.classList.add("active");
          });
        });
      });
    }

    function collectPreferences() {
      const result = {};

      document.querySelectorAll(".segment").forEach((segment) => {
        const key = segment.dataset.key;
        const activeButton = segment.querySelector("button.active");

        if (activeButton) {
          result[key] = activeButton.dataset.value;
        }
      });

      return result;
    }

    async function savePreferences() {
      const saveBtn = document.getElementById("saveBtn");
      const message = document.getElementById("message");
      const preferences = collectPreferences();

      if (Object.keys(preferences).length === 0) {
        message.innerText = "どれか選んでください";
        return;
      }

      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span>保存中';
      message.innerText = "";

      try {
        console.log("userId:", userId);
        console.log("preferences:", preferences);

        await new Promise((resolve) => setTimeout(resolve, 1000));

        saveBtn.innerText = "保存しました ✓";
        message.innerText = "更新しました";

        setTimeout(() => {
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        }, 800);
      } catch (error) {
        console.error(error);
        saveBtn.innerText = "保存する";
        message.innerText = "保存に失敗しました";
      } finally {
        setTimeout(() => {
          saveBtn.disabled = false;
          saveBtn.innerText = "保存する";
        }, 1200);
      }
    }

    document.getElementById("saveBtn").addEventListener("click", savePreferences);

    document.getElementById("closeBtn").addEventListener("click", () => {
      if (liff.isInClient()) {
        liff.closeWindow();
      }
    });

    setupSegments();
    main();
  </script>
</body>
</html>
