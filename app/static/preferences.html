<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ラーメンの好み</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f7;
        color: #2f2f2f;
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      h1 {
        margin: 0 0 8px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .sub {
        margin: 0 0 20px;
        text-align: center;
        font-size: 13px;
        color: #7a7a7a;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      }

      .label {
        flex: 0 0 72px;
        font-size: 14px;
        font-weight: 700;
        color: #343434;
      }

      .segment {
        display: flex;
        flex: 1;
        border: 1px solid #e6e6ea;
        border-radius: 12px;
        overflow: hidden;
        background: #f7f7f9;
      }

      .segment button {
        flex: 1;
        min-height: 38px;
        padding: 8px 4px;
        border: none;
        border-right: 1px solid #e6e6ea;
        background: transparent;
        color: #666;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        transition:
          background-color 0.15s ease,
          color 0.15s ease,
          opacity 0.15s ease;
      }

      .segment button:last-child {
        border-right: none;
      }

      .segment button.active {
        background: #ff8c3a;
        color: #fff;
      }

      .segment button:active {
        opacity: 0.85;
      }

      .save {
        display: block;
        width: 92%;
        margin: 24px auto 0;
        min-height: 40px;
        padding: 12px 16px;
        border: 2px solid #f08a3c;
        border-radius: 14px;
        background: #fffaf6;
        color: #e07a2b;
        font-size: 16px;
        font-weight: 700;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        transition:
          transform 0.12s ease,
          background-color 0.12s ease,
          color 0.12s ease;
      }

      .save:active {
        transform: scale(0.98);
      }

      .save:disabled {
        opacity: 0.9;
      }

      .close {
        width: 100%;
        margin-top: 10px;
        margin-bottom: 20px;
        min-height: 40px;
        padding: 10px 12px;
        border: none;
        background: none;
        color: #8d8d93;
        font-size: 14px;
        font-weight: 500;
        border-radius: 10px;
        transition:
          background-color 0.1s ease,
          transform 0.1s ease,
          color 0.1s ease;
      }

      .close:active {
        background: #e8e8ed;
        transform: scale(0.96);
        color: #3c3c43;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        margin-right: 8px;
        vertical-align: -3px;
        border: 3px solid #ffd9bf;
        border-top: 3px solid #e07a2b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* オーバーレイ */
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        align-items: center;
        justify-content: center;
        z-index: 100;
        animation: fadeIn 0.2s ease;
      }

      #overlay.show {
        display: flex;
      }

      #overlayContent {
        background: #fff;
        border-radius: 20px;
        padding: 36px 32px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 300px;
        width: 80%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      }

      #overlayEmoji {
        font-size: 48px;
      }

      #overlayTitle {
        font-size: 18px;
        font-weight: 700;
        color: #2f2f2f;
      }

      #overlayBody {
        font-size: 13px;
        color: #6f6f73;
        line-height: 1.6;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- オーバーレイ -->
    <div id="overlay">
      <div id="overlayContent">
        <div id="overlayEmoji">✅</div>
        <div id="overlayTitle">好みを登録しました！</div>
        <div id="overlayBody">
          トークに戻ってラーメンを検索してみてください🍜
        </div>
      </div>
    </div>

    <div class="container">
      <h1>ラーメンの好み</h1>
      <p class="sub">
        登録された好みをもとに検索結果を表示します。<br />
        設定なしでも保存、検索ができます。
      </p>

      <div class="row">
        <div class="label">こってり</div>
        <div class="segment" data-key="こってり">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">あっさり</div>
        <div class="segment" data-key="あっさり">

          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">魚介</div>
        <div class="segment" data-key="魚介">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">煮干し</div>
        <div class="segment" data-key="煮干し">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">鶏白湯</div>
        <div class="segment" data-key="鶏白湯">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">豚骨</div>
        <div class="segment" data-key="豚骨">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">味噌</div>
        <div class="segment" data-key="味噌">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">醤油</div>
        <div class="segment" data-key="醤油">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">塩</div>
        <div class="segment" data-key="塩">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">辛い</div>
        <div class="segment" data-key="辛い">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">家系</div>
        <div class="segment" data-key="家系">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <div class="row">
        <div class="label">二郎系</div>
        <div class="segment" data-key="二郎系">
          <button type="button" data-value="love">大好き</button>
          <button type="button" data-value="like">好き</button>
          <button type="button" data-value="neutral">普通</button>
          <button type="button" data-value="dislike">苦手</button>
        </div>
      </div>

      <button id="saveBtn" class="save" type="button">保存する</button>
      <button id="closeBtn" class="close" type="button">閉じる</button>
    </div>

    <script>
      let userId = null;

      const STRONG_CATEGORIES = new Set(["あっさり", "こってり", "辛い"]);

      const STRONG_SCORE_MAP = {
        love: 0.5,
        like: 0.25,
        neutral: 0,
        dislike: -0.25,
      };

      const WEAK_SCORE_MAP = {
        love: 0.25,
        like: 0.125,
        neutral: 0,
        dislike: -0.125,
      };

      async function main() {
        try {
          await liff.init({
            liffId: "2009360861-I31kIVzt",
          });

          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          const profile = await liff.getProfile();
          userId = profile.userId;

          await loadPreferences();
        } catch (error) {
          document.body.insertAdjacentHTML(
            "afterbegin",
            `<div style="background:red;color:white;padding:10px;word-break:break-all">${error}</div>`,
          );
        }
      }

      function setupSegments() {
        document.querySelectorAll(".segment").forEach((segment) => {
          segment.querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => {
              segment.querySelectorAll("button").forEach((b) => {
                b.classList.remove("active");
              });
              button.classList.add("active");
            });
          });
        });
      }

      function valueToWeight(category, value) {
        const scoreMap = STRONG_CATEGORIES.has(category)
          ? STRONG_SCORE_MAP
          : WEAK_SCORE_MAP;
        return scoreMap[value] ?? 0;
      }

      function collectWeights() {
        const result = {};
        document.querySelectorAll(".segment").forEach((segment) => {
          const category = segment.dataset.key;
          const activeButton = segment.querySelector("button.active");
          if (!activeButton) return;
          const value = activeButton.dataset.value;
          result[category] = valueToWeight(category, value);
        });
        return result;
      }

      function normalizeWeights(weights) {
        return Object.fromEntries(
          Object.entries(weights || {}).sort(([a], [b]) => a.localeCompare(b)),
        );
      }

      async function loadPreferences() {
        if (!userId) return;

        const response = await fetch(
          `/api/preferences?user_id=${encodeURIComponent(userId)}`,
        );

        if (!response.ok) throw new Error("load failed");

        const data = await response.json();
        applyInitialWeights(data.weights || {});
      }

      function weightToValue(category, weight) {
        const scoreMap = STRONG_CATEGORIES.has(category)
          ? { 0.5: "love", 0.25: "like", 0: "neutral", "-0.25": "dislike" }
          : { 0.25: "love", 0.125: "like", 0: "neutral", "-0.125": "dislike" };
        return scoreMap[String(weight)];
      }

      function applyInitialWeights(weights) {
        document.querySelectorAll(".segment").forEach((segment) => {
          const category = segment.dataset.key;
          const weight = weights[category];
          if (weight === undefined) return;

          const value = weightToValue(category, weight);
          if (!value) return;

          segment
            .querySelectorAll("button")
            .forEach((b) => b.classList.remove("active"));

          const targetButton = segment.querySelector(
            `button[data-value="${value}"]`,
          );
          if (targetButton) targetButton.classList.add("active");
        });
      }

      async function savePreferences() {
        const saveBtn = document.getElementById("saveBtn");
        const weights = collectWeights();

        if (!userId) {
          alert(
            "ユーザー情報が取得できていないため保存できません。LINEアプリ内で開き直してください。",
          );
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner"></span>保存中';

        try {
          const response = await fetch("/api/preferences", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: userId, weights }),
          });

          if (!response.ok) {
            const message = await response.text();
            throw new Error(`save failed: ${response.status} ${message}`);
          }

          const verifyResponse = await fetch(
            `/api/preferences?user_id=${encodeURIComponent(userId)}`,
          );
          if (!verifyResponse.ok) {
            throw new Error(`verify failed: ${verifyResponse.status}`);
          }
          const verifyData = await verifyResponse.json();
          const expected = JSON.stringify(normalizeWeights(weights));
          const actual = JSON.stringify(normalizeWeights(verifyData.weights));
          if (expected !== actual) {
            throw new Error(
              `save verification mismatch: expected=${expected} actual=${actual}`,
            );
          }

          // オーバーレイ表示
          document.getElementById("overlay").classList.add("show");

          // 1.5秒後に閉じる
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 1500);
        } catch (error) {
          console.error("preference save error", error);
          alert(
            `保存に失敗しました。通信状況をご確認の上、再度お試しください。\n${error.message || error}`,
          );
          saveBtn.innerText = "保存する";
          saveBtn.disabled = false;
        }
      }

      document
        .getElementById("saveBtn")
        .addEventListener("click", savePreferences);

      document.getElementById("closeBtn").addEventListener("click", () => {
        if (liff.isInClient()) {
          liff.closeWindow();
          return;
        }
        if (window.liff) {
          liff.closeWindow();
        } else {
          window.close();
        }
        setTimeout(() => {
          // フォールバック（開発環境など）
        }, 300);
      });

      setupSegments();
      main();
    </script>
  </body>
</html>
