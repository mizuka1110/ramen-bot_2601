<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ラーメンの好み</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f7;
        color: #2f2f2f;
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }

      h1 {
        margin: 0 0 8px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .sub {
        margin: 0 0 20px;
        text-align: center;
        font-size: 13px;
        color: #7a7a7a;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        margin-bottom: 10px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      }

      .label {
        flex: 0 0 72px;
        font-size: 14px;
        font-weight: 700;
        color: #343434;
      }

      .segment {
        display: flex;
        flex: 1;
        border: 1px solid #e6e6ea;
        border-radius: 12px;
        overflow: hidden;
        background: #f7f7f9;
      }

      .segment button {
        flex: 1;
        min-height: 38px;
        padding: 8px 4px;
        border: none;
        border-right: 1px solid #e6e6ea;
        background: transparent;
        color: #666;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        transition:
          background-color 0.15s ease,
          color 0.15s ease,
          opacity 0.15s ease;
      }

      .segment button:last-child {
        border-right: none;
      }

      .segment button.active {
        background: #ff8c3a;
        color: #fff;
      }

      .segment button:active {
        opacity: 0.85;
      }

      .save {
        display: block;
        width: 92%;
        margin: 24px auto 0;
        min-height: 40px;
        padding: 12px 16px;
        border: 2px solid #f08a3c;
        border-radius: 14px;
        background: #fffaf6;
        color: #e07a2b;
        font-size: 16px;
        font-weight: 700;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
        transition:
          transform 0.12s ease,
          background-color 0.12s ease,
          color 0.12s ease;
      }

      .save:active {
        transform: scale(0.98);
      }

      .save:disabled {
        opacity: 0.9;
      }

      .close {
        width: 100%;
        margin-top: 10px;
        margin-bottom: 20px;
        min-height: 40px;
        padding: 10px 12px;
        border: none;
        background: none;
        color: #8d8d93;
        font-size: 14px;
        font-weight: 500;
        border-radius: 10px;
        transition:
          background-color 0.1s ease,
          transform 0.1s ease,
          color 0.1s ease;
      }

      .close:active {
        background: #e8e8ed;
        transform: scale(0.96);
        color: #3c3c43;
      }

      .location-actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }

      .location-actions button {
        flex: 1;
        min-height: 42px;
        border-radius: 12px;
        border: 1px solid #e6e6ea;
        background: #ffffff;
        color: #444;
        font-weight: 700;
      }

      .location-actions button.active {
        border-color: #ff8c3a;
        color: #ff8c3a;
        background: #fff6ef;
      }

      .datetime-panel {
        margin-top: 10px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        border: none;
      }

      .datetime-panel.hidden {
        display: none;
      }

      .datetime-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      @media (max-width: 420px) {
        .datetime-grid {
          grid-template-columns: 1fr;
        }
      }

      .datetime-grid label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 6px;
      }

      .datetime-grid input {
        width: 100%;
        min-height: 42px;
        border-radius: 10px;
        border: 1px solid #e6e6ea;
        padding: 10px;
        background: #f3f4f6;
        display: block;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        margin-right: 8px;
        vertical-align: -3px;
        border: 3px solid #ffd9bf;
        border-top: 3px solid #e07a2b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* オーバーレイ */
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        align-items: center;
        justify-content: center;
        z-index: 100;
        animation: fadeIn 0.2s ease;
      }

      #overlay.show {
        display: flex;
      }

      #overlayContent {
        background: #fff;
        border-radius: 20px;
        padding: 36px 32px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 300px;
        width: 80%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      }

      #overlayEmoji {
        font-size: 48px;
      }

      #overlayTitle {
        font-size: 18px;
        font-weight: 700;
        color: #2f2f2f;
      }

      #overlayBody {
        font-size: 13px;
        color: #6f6f73;
        line-height: 1.6;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>

    <script>
      let userId = null;
      const params = new URLSearchParams(window.location.search);
      const liffStateRaw = params.get("liff.state") || "";
      const liffState = (() => {
        try {
          return decodeURIComponent(liffStateRaw);
        } catch (_) {
          return liffStateRaw;
        }
      })();
      const pageMode =
        params.get("mode") === "location" ||
        liffState.includes("mode=location") ||
        /\/location(?:$|\?)/.test(liffState) ||
        /\/preferences\/location(?:$|\?)/.test(window.location.pathname)
          ? "location"
          : "preferences";

      const STRONG_CATEGORIES = new Set(["あっさり", "こってり", "辛い"]);

      const STRONG_SCORE_MAP = {
        addict: 100,
        love: 0.5,
        like: 0.25,
        neutral: 0,
        dislike: -0.25,
      };

      const WEAK_SCORE_MAP = {
        addict: 100,
        love: 0.25,
        like: 0.125,
        neutral: 0,
        dislike: -0.125,
      };

      async function main() {
        try {
          await liff.init({
            liffId: "2009360861-I31kIVzt",
          });

          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          const profile = await liff.getProfile();
          userId = profile.userId;

          if (pageMode === "location") {
            prepareLocationModeUI();
            return;
          }

          await loadPreferences();
        } catch (error) {
          document.body.insertAdjacentHTML(
            "afterbegin",
            `<div style="background:red;color:white;padding:10px;word-break:break-all">${error}</div>`,
          );
        }
      }

      function prepareLocationModeUI() {
        const titleEl = document.querySelector("h1");
        const subEl = document.querySelector(".sub");
        if (titleEl) titleEl.textContent = "ラーメンを検索する";
        if (subEl) subEl.textContent = "下のボタンで現在地をLINEトークに送ります。";

        document.querySelectorAll(".row").forEach((row) => {
          row.style.display = "none";
        });

        const saveBtn = document.getElementById("saveBtn");
        saveBtn.innerText = "地図を出して検索する";

        const container = document.querySelector(".container");
        if (!container) return;

        const zone = document.createElement("div");
        zone.innerHTML = `
          <div class="location-actions">
            <button id="searchNowBtn" class="active" type="button">今すぐ</button>
            <button id="searchWithDatetimeBtn" type="button">日時指定</button>
          </div>
          <div id="datetimePanel" class="datetime-panel hidden">
            <div class="datetime-grid">
              <div>
                <label for="searchDate">日付</label>
                <input id="searchDate" type="date" />
              </div>
              <div>
                <label for="searchTime">時間</label>
                <input id="searchTime" type="time" />
              </div>
            </div>
          </div>
        `;
        saveBtn.parentNode?.insertBefore(zone, saveBtn);

        const nowBtn = document.getElementById("searchNowBtn");
        const withDatetimeBtn = document.getElementById("searchWithDatetimeBtn");
        const datetimePanel = document.getElementById("datetimePanel");

        if (!nowBtn || !withDatetimeBtn || !datetimePanel) return;

        nowBtn.addEventListener("click", () => {
          nowBtn.classList.add("active");
          withDatetimeBtn.classList.remove("active");
          datetimePanel.classList.add("hidden");
        });

        withDatetimeBtn.addEventListener("click", () => {
          withDatetimeBtn.classList.add("active");
          nowBtn.classList.remove("active");
          datetimePanel.classList.remove("hidden");
          localStorage.setItem("ramen-location-mode", "datetime");
        });

        nowBtn.addEventListener("click", () => {
          localStorage.setItem("ramen-location-mode", "now");
        });

        initializeDatetimeInputs();
        const savedMode = localStorage.getItem("ramen-location-mode");
        if (savedMode === "datetime") {
          withDatetimeBtn.click();
        }
      }

      async function getCurrentPosition() {
        return await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          });
        });
      }

      async function sendCurrentLocation() {
        const saveBtn = document.getElementById("saveBtn");
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner"></span>検索中';
        try {
          if (!navigator.geolocation) {
            throw new Error("この端末は位置情報取得に対応していません。");
          }

          const pos = await getCurrentPosition();
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          const nowMode = document
            .getElementById("searchNowBtn")
            ?.classList.contains("active");
          const payload = {
            timezone: "Asia/Tokyo",
            datetime: "",
          };
          if (!nowMode) {
            const dt = collectSelectedDatetimeIsoJst();
            if (dt) payload.datetime = dt;
          }

          await liff.sendMessages([
            {
              type: "location",
              title: "ラーメン検索",
              address: `datetime=${encodeURIComponent(payload.datetime)}&timezone=${encodeURIComponent(payload.timezone)}`,
              latitude: lat,
              longitude: lng,
            },
          ]);
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        } catch (error) {
          alert(
            `位置情報の送信に失敗しました。通信状況をご確認の上、再度お試しください。\n${error.message || error}`,
          );
          saveBtn.innerText = "地図を出して検索する";
          saveBtn.disabled = false;
        }
      }

      function initializeDatetimeInputs() {
        const dateInput = document.getElementById("searchDate");
        const timeInput = document.getElementById("searchTime");
        if (!dateInput || !timeInput) return;

        const nowJst = new Date(
          new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }),
        );
        const roundedHour = new Date(nowJst);
        if (roundedHour.getMinutes() >= 30) {
          roundedHour.setHours(roundedHour.getHours() + 1);
        }
        roundedHour.setMinutes(0, 0, 0);
        const minDate = formatDateJst(nowJst);
        const maxDateObj = new Date(nowJst);
        maxDateObj.setDate(maxDateObj.getDate() + 14);
        dateInput.min = minDate;
        dateInput.max = formatDateJst(maxDateObj);
        const storedDate = localStorage.getItem("ramen-search-date");
        const storedTime = localStorage.getItem("ramen-search-time");
        dateInput.value =
          storedDate && storedDate >= dateInput.min && storedDate <= dateInput.max
            ? storedDate
            : minDate;
        timeInput.value =
          storedTime && /^\d{2}:\d{2}$/.test(storedTime)
            ? storedTime
            : `${String(roundedHour.getHours()).padStart(2, "0")}:00`;

        dateInput.addEventListener("change", () => {
          localStorage.setItem("ramen-search-date", dateInput.value);
        });
        timeInput.addEventListener("change", () => {
          localStorage.setItem("ramen-search-time", timeInput.value);
        });
      }

      function formatDateJst(dateObj) {
        const y = dateObj.getFullYear();
        const m = String(dateObj.getMonth() + 1).padStart(2, "0");
        const d = String(dateObj.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function collectSelectedDatetimeIsoJst() {
        const dateInput = document.getElementById("searchDate");
        const timeInput = document.getElementById("searchTime");
        if (!dateInput || !timeInput || !dateInput.value || !timeInput.value) {
          return null;
        }
        return `${dateInput.value}T${timeInput.value}:00+09:00`;
      }

      function setupSegments() {
        ensureAddictButtons();
        document.querySelectorAll(".segment").forEach((segment) => {
          segment.querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => {
              segment.querySelectorAll("button").forEach((b) => {
                b.classList.remove("active");
              });
              button.classList.add("active");
            });
          });
        });
      }

      function ensureAddictButtons() {
        document.querySelectorAll(".segment").forEach((segment) => {
          if (segment.querySelector('button[data-value="addict"]')) return;
          const firstButton = segment.querySelector("button");
          if (!firstButton) return;

          const addictButton = document.createElement("button");
          addictButton.type = "button";
          addictButton.dataset.value = "addict";
          addictButton.textContent = "中毒";
          segment.insertBefore(addictButton, firstButton);
        });
      }

      function valueToWeight(category, value) {
        const scoreMap = STRONG_CATEGORIES.has(category)
          ? STRONG_SCORE_MAP
          : WEAK_SCORE_MAP;
        return scoreMap[value] ?? 0;
      }

      function collectWeights() {
        const result = {};
        document.querySelectorAll(".segment").forEach((segment) => {
          const category = segment.dataset.key;
          const activeButton = segment.querySelector("button.active");
          if (!activeButton) return;
          const value = activeButton.dataset.value;
          result[category] = valueToWeight(category, value);
        });
        return result;
      }

      function normalizeWeights(weights) {
        return Object.fromEntries(
          Object.entries(weights || {}).sort(([a], [b]) => a.localeCompare(b)),
        );
      }

      async function loadPreferences() {
        if (!userId) return;

        const response = await fetch(
          `/api/preferences?user_id=${encodeURIComponent(userId)}`,
        );

        if (!response.ok) throw new Error("load failed");

        const data = await response.json();
        applyInitialWeights(data.weights || {});
      }

      function weightToValue(category, weight) {
        const scoreMap = STRONG_CATEGORIES.has(category)
          ? { 100: "addict", 0.5: "love", 0.25: "like", 0: "neutral", "-0.25": "dislike" }
          : { 100: "addict", 0.25: "love", 0.125: "like", 0: "neutral", "-0.125": "dislike" };
        return scoreMap[String(weight)];
      }

      function applyInitialWeights(weights) {
        document.querySelectorAll(".segment").forEach((segment) => {
          const category = segment.dataset.key;
          const weight = weights[category];
          if (weight === undefined) return;

          const value = weightToValue(category, weight);
          if (!value) return;

          segment
            .querySelectorAll("button")
            .forEach((b) => b.classList.remove("active"));

          const targetButton = segment.querySelector(
            `button[data-value="${value}"]`,
          );
          if (targetButton) targetButton.classList.add("active");
        });
      }

      async function savePreferences() {
        const saveBtn = document.getElementById("saveBtn");
        const weights = collectWeights();
        const SAVE_TIMEOUT_MS = 15000;

        if (!userId) {
          alert(
            "ユーザー情報が取得できていないため保存できません。LINEアプリ内で開き直してください。",
          );
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner"></span>保存中';

        try {
          const saveController = new AbortController();
          let saveTimeout = setTimeout(
            () => saveController.abort("save request timeout"),
            SAVE_TIMEOUT_MS,
          );
          let response;
          try {
            response = await fetch("/api/preferences", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ user_id: userId, weights }),
              signal: saveController.signal,
            });
          } finally {
            clearTimeout(saveTimeout);
          }

          if (!response.ok) {
            const message = await response.text();
            throw new Error(`save failed: ${response.status} ${message}`);
          }

          // 保存後の検証はベストエフォートで実施。
          // ここで通信失敗しても保存自体は完了している可能性があるため、
          // ユーザーには失敗扱いにしない。
          try {
            const verifyResponse = await fetch(
              `/api/preferences?user_id=${encodeURIComponent(userId)}`,
            );
            if (!verifyResponse.ok) {
              throw new Error(`verify failed: ${verifyResponse.status}`);
            }
            const verifyData = await verifyResponse.json();
            const expected = JSON.stringify(normalizeWeights(weights));
            const actual = JSON.stringify(normalizeWeights(verifyData.weights));
            if (expected !== actual) {
              console.warn(
                `save verification mismatch: expected=${expected} actual=${actual}`,
              );
            }
          } catch (verifyError) {
            console.warn("save verification skipped:", verifyError);
          }

          // オーバーレイ表示
          document.getElementById("overlay").classList.add("show");

          // 1.5秒後に閉じる
          setTimeout(() => {
            if (liff.isInClient()) {
              liff.closeWindow();
            }
          }, 1500);
        } catch (error) {
          console.error("preference save error", error);
          alert(
            `保存に失敗しました。通信状況をご確認の上、再度お試しください。\n${error.message || error}`,
          );
          saveBtn.innerText = "保存する";
          saveBtn.disabled = false;
        }
      }

      document.getElementById("saveBtn").addEventListener("click", () => {
        if (pageMode === "location") {
          sendCurrentLocation();
          return;
        }
        savePreferences();
      });

      document.getElementById("closeBtn").addEventListener("click", () => {
        if (liff.isInClient()) {
          liff.closeWindow();
          return;
        }
        if (window.liff) {
          liff.closeWindow();
        } else {
          window.close();
        }
        setTimeout(() => {
          // フォールバック（開発環境など）
        }, 300);
      });

      setupSegments();
      main();
    </script>
  </body>
</html>
