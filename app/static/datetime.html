<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日時指定</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: #fffaf5;
        color: #222;
      }
      .card {
        width: min(520px, 70%);
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 16px;
        color: #555;
      }
      input,
      button {
        width: min(360px, 70%);
        box-sizing: border-box;
        margin-left: auto;
        margin-right: auto;
      }
      input {
        display: block;
        max-width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        padding-right: 42px;
        font-size: 16px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        color: #222;
        overflow: hidden;
      }
      button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff8c3a;
        color: white;
        font-weight: 700;
      }
      button:disabled {
        opacity: 0.6;
      }
      .note {
        margin-top: 12px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>日時を指定</h1>
      <p>設定した日時の情報を検索できます。</p>
      <input id="dt" type="datetime-local" />
      <button id="send" type="button">この日時に設定する</button>
      <p id="status" class="note"></p>
    </div>
    <script>
      const dt = document.getElementById("dt");
      const send = document.getElementById("send");
      const status = document.getElementById("status");
      const DEFAULT_LIFF_ID = "2009360861-udWtvLeU";
      const liffId =
        new URLSearchParams(window.location.search).get("liffId") || DEFAULT_LIFF_ID;

      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0, 16);
      dt.value = local;

      const setStatus = (text) => {
        status.textContent = text;
      };

      liff
        .init({ liffId })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          send.addEventListener("click", async () => {
            if (!dt.value) return;

            const text = `日時指定:${dt.value}`;
            send.disabled = true;

            try {
              if (liff.isInClient()) {
                await liff.sendMessages([{ type: "text", text }]);
                liff.closeWindow();
              } else {
                window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
              }
            } catch (error) {
              console.error(error);
              setStatus("送信に失敗しました。もう一度お試しください。");
            } finally {
              send.disabled = false;
            }
          });
        })
        .catch((error) => {
          console.error(error);
          alert(`LIFFの初期化に失敗しました: ${error}`);
          setStatus("LIFFの初期化に失敗しました。URL設定を確認してください。");
        });
    </script>
  </body>
</html>
