<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日時指定</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: #fffaf5;
        color: #222;
      }
      .card {
        width: min(520px, 92%);
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 16px;
        color: #555;
      }
      #dt,
      button {
        width: 100%;
        box-sizing: border-box;
      }
      #dt {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        margin-bottom: 12px;
      }
      button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff8c3a;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>日時を指定</h1>
      <p>設定した日時の情報を検索できます。</p>
      <input id="dt" type="datetime-local" />
      <button id="send" type="button">LINEに送る</button>
    </div>

    <script>
      const dt = document.getElementById("dt");
      const send = document.getElementById("send");

      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0, 16);
      dt.value = local;

      const liffId =
        new URLSearchParams(window.location.search).get("liffId") || "2009360861-udWtvLeU";

      liff
        .init({ liffId })
        .then(() => {
          send.addEventListener("click", async () => {
            if (!dt.value) return;
            send.disabled = true;
            send.textContent = "送信中...";
            const text = `日時指定:${dt.value}`;

            try {
              if (liff.isInClient()) {
                await liff.sendMessages([{ type: "text", text }]);
                liff.closeWindow();
              } else {
                window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
              }
            } catch (err) {
              alert("送信に失敗しました: " + err);
              send.disabled = false;
              send.textContent = "LINEに送る";
            }
          });
        })
        .catch((err) => {
          alert("LIFFの初期化に失敗しました: " + err);
        });
    </script>
  </body>
</html>
