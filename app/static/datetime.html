<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日時指定</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: #fffaf5;
        color: #222;
      }
      .card {
        width: min(520px, 92%);
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 16px;
        color: #555;
      }
      .datetime-picker,
      button {
        width: 100%;
        box-sizing: border-box;
      }
      .datetime-picker {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }
      .time-picker {
        grid-template-columns: repeat(2, 1fr);
      }
      select {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        font-size: 16px;
        background: #fff;
      }
      .divider {
        margin: 6px 0 12px;
        font-size: 14px;
        color: #666;
      }
      button {
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #ff8c3a;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>日時を指定</h1>
      <p>設定した日時の情報を検索できます。</p>
      <div class="datetime-picker">
        <select id="year"></select>
        <select id="month"></select>
        <select id="day"></select>
      </div>
      <div class="divider">↓ 時刻を選択</div>
      <div class="datetime-picker time-picker">
        <select id="hour"></select>
        <select id="minute"></select>
      </div>
      <p id="envHint"></p>
      <button id="send" type="button">設定する</button>
    </div>

    <script>
      const year = document.getElementById("year");
      const month = document.getElementById("month");
      const day = document.getElementById("day");
      const hour = document.getElementById("hour");
      const minute = document.getElementById("minute");
      const send = document.getElementById("send");
      const envHint = document.getElementById("envHint");

      const now = new Date();

      function buildOptions(select, from, to, suffix = "", pad = false, step = 1) {
        for (let i = from; i <= to; i += step) {
          const option = document.createElement("option");
          const value = pad ? String(i).padStart(2, "0") : String(i);
          option.value = value;
          option.textContent = `${i}${suffix}`;
          select.appendChild(option);
        }
      }

      function daysInMonth(y, m) {
        return new Date(Number(y), Number(m), 0).getDate();
      }

      buildOptions(year, now.getFullYear(), now.getFullYear() + 1, "年");
      buildOptions(month, 1, 12, "月", true);
      buildOptions(hour, 0, 23, "時", true);
      buildOptions(minute, 0, 50, "分", true, 10);

      year.value = String(now.getFullYear());
      month.value = String(now.getMonth() + 1).padStart(2, "0");
      hour.value = String(now.getHours()).padStart(2, "0");
      minute.value = String(Math.floor(now.getMinutes() / 10) * 10).padStart(2, "0");

      function syncDays() {
        const maxDays = daysInMonth(year.value, month.value);
        const prev = day.value || String(now.getDate()).padStart(2, "0");
        day.innerHTML = "";
        buildOptions(day, 1, maxDays, "日", true);
        day.value = Number(prev) <= maxDays ? prev : String(maxDays).padStart(2, "0");
      }

      year.addEventListener("change", syncDays);
      month.addEventListener("change", syncDays);
      syncDays();

      const liffId =
        new URLSearchParams(window.location.search).get("liffId") || "2009360861-udWtvLeU";

      liff
        .init({ liffId })
        .then(() => {
          if (!liff.isInClient()) {
            envHint.textContent =
              "※ LINEアプリ内で開かれていないため、自動送信できない場合があります。";
          }

          send.addEventListener("click", async () => {
            send.disabled = true;
            send.textContent = "送信中...";
            const text = `日時指定:${year.value}-${month.value}-${day.value}T${hour.value}:${minute.value}`;

            try {
              if (liff.isInClient()) {
                await liff.sendMessages([{ type: "text", text }]);
                liff.closeWindow();
              } else if (liff.isApiAvailable("shareTargetPicker")) {
                const result = await liff.shareTargetPicker([{ type: "text", text }]);
                if (result === null) {
                  alert("送信がキャンセルされました。");
                  send.disabled = false;
                  send.textContent = "設定する";
                }
              } else {
                window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
              }
            } catch (err) {
              alert("送信に失敗しました: " + err);
              send.disabled = false;
              send.textContent = "設定する";
            }
          });
        })
        .catch((err) => {
          alert("LIFFの初期化に失敗しました: " + err);
        });
    </script>
  </body>
</html>
