<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ラーメンを探す</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #2f2f2f; }
      .container { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }
      h1 { margin: 0 0 20px; text-align: center; font-size: 24px; }
      .row { background:#fff; border-radius:14px; padding: 12px; margin-bottom: 10px; box-shadow:0 1px 4px rgba(0,0,0,.05); }
      .label { display:block; font-size: 13px; color:#666; margin-bottom: 6px; }
      input { width:100%; min-height:42px; border-radius:10px; border:1px solid #e6e6ea; padding:8px 10px; background:#f3f4f6; }
      .btn { display:block; width:92%; margin: 12px auto 0; min-height: 44px; border:2px solid #f08a3c; border-radius: 14px; background:#fffaf6; color:#e07a2b; font-size:16px; font-weight:700; }
      .btn-inline { width:100%; margin:0; }
      .btn:disabled { opacity:.85; }
      .spinner { display:inline-block; width:18px; height:18px; margin-right:8px; vertical-align:-3px; border:3px solid #ffd9bf; border-top:3px solid #e07a2b; border-radius:50%; animation: spin .8s linear infinite; }
      @keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ラーメンを探す</h1>

      <div class="row">
        <span class="label">場所選択</span>
        <button id="mapBtn" class="btn btn-inline" type="button">LINE地図から場所を選ぶ</button>
      </div>

      <div class="row">
        <label class="label" for="searchDate">日付</label>
        <input id="searchDate" type="date" />
      </div>

      <div class="row">
        <label class="label" for="searchTime">時間</label>
        <input id="searchTime" type="time" step="3600" />
      </div>

      <button id="searchBtn" class="btn" type="button">検索する</button>
    </div>

    <script>
      const LIFF_ID = new URLSearchParams(location.search).get("liffId") || "2009360861-I31kIVzt";
      const DATETIME_CACHE_KEY = "ramen-search-datetime-cache-v1";
      const DATETIME_CACHE_TTL_MS = 30 * 60 * 1000;
      const mapBtn = document.getElementById("mapBtn");
      const searchBtn = document.getElementById("searchBtn");
      const dateInput = document.getElementById("searchDate");
      const timeInput = document.getElementById("searchTime");

      function nowDate() {
        return new Date();
      }

      function pad(n) {
        return String(n).padStart(2, "0");
      }

      function formatDate(date) {
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      }

      function roundToNearestHour(date) {
        const d = new Date(date);
        if (d.getMinutes() >= 30) d.setHours(d.getHours() + 1);
        d.setMinutes(0, 0, 0);
        return d;
      }

      function buildDatetime() {
        if (!dateInput.value || !timeInput.value) return "";
        return `${dateInput.value}T${timeInput.value}:00+09:00`;
      }

      async function getCurrentPosition() {
        return new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0,
          });
        });
      }

      function initDatetimeInputs() {
        const now = nowDate();
        const rounded = roundToNearestHour(now);
        const max = new Date(now);
        max.setDate(max.getDate() + 14);
        dateInput.min = formatDate(now);
        dateInput.max = formatDate(max);
        const defaults = {
          date: dateInput.min,
          time: `${pad(rounded.getHours())}:00`,
        };

        const cached = loadDatetimeCache(defaults);
        dateInput.value = cached.date;
        timeInput.value = cached.time;
      }

      function loadDatetimeCache(defaults) {
        try {
          const raw = localStorage.getItem(DATETIME_CACHE_KEY);
          if (!raw) return defaults;
          const parsed = JSON.parse(raw);
          const now = Date.now();
          if (!parsed?.savedAt || now - parsed.savedAt > DATETIME_CACHE_TTL_MS) {
            localStorage.removeItem(DATETIME_CACHE_KEY);
            return defaults;
          }
          const date = parsed.date || defaults.date;
          const time = parsed.time || defaults.time;
          if (date < dateInput.min || date > dateInput.max) {
            return defaults;
          }
          if (!/^\d{2}:\d{2}$/.test(time)) {
            return defaults;
          }
          return { date, time };
        } catch (_) {
          localStorage.removeItem(DATETIME_CACHE_KEY);
          return defaults;
        }
      }

      function saveDatetimeCache() {
        const payload = {
          date: dateInput.value,
          time: timeInput.value,
          savedAt: Date.now(),
        };
        localStorage.setItem(DATETIME_CACHE_KEY, JSON.stringify(payload));
      }

      async function main() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        initDatetimeInputs();
      }

      mapBtn.addEventListener("click", () => {
        if (!liff.isInClient()) {
          alert("LINEアプリ内で開くと地図から場所を選べます。");
          return;
        }
        try {
          liff.openWindow({ url: "line://nv/location", external: false });
        } catch (_) {
          window.location.href = "line://nv/location";
        }
      });

      dateInput.addEventListener("change", saveDatetimeCache);
      timeInput.addEventListener("change", saveDatetimeCache);

      searchBtn.addEventListener("click", async () => {
        searchBtn.disabled = true;
        searchBtn.innerHTML = '<span class="spinner"></span>送信中';
        try {
          if (!liff.isInClient()) {
            throw new Error("LINEアプリ内で開いてください。");
          }
          if (!navigator.geolocation) throw new Error("この端末は位置情報に未対応です。");
          saveDatetimeCache();
          const pos = await getCurrentPosition();
          const datetime = encodeURIComponent(buildDatetime());
          await liff.sendMessages([
            {
              type: "location",
              title: "ラーメン検索",
              address: `datetime=${datetime}`,
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
            },
          ]);
          if (liff.isInClient()) liff.closeWindow();
        } catch (error) {
          alert(`送信に失敗しました。\n${error.message || error}`);
          searchBtn.disabled = false;
          searchBtn.textContent = "検索する";
        }
      });

      main().catch((error) => {
        alert(`LIFF初期化に失敗しました。\n${error.message || error}`);
      });
    </script>
  </body>
</html>
